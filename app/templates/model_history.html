<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pick History</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#000000", card: "#1a1a1a", cardhi: "#222222", border: "#2a2a2a",
            accent: "#7C3AED", accenthi: "#9F67FF",
            pos: "#22c55e", neg: "#ef4444", warn: "#eab308",
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
        },
      },
    };
  </script>

  <style>
    html, body { background: #000; }
    body { font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    .mh-text-pos { color: #22c55e; }
    .mh-text-neg { color: #ef4444; }
    .mh-text-warn{ color: #eab308; }
    .mh-text-dim { color: #9ca3af; }
    .mh-text-text{ color: #ffffff; }

    .toast-stack {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column-reverse; gap: 8px;
      z-index: 60; pointer-events: none; max-width: calc(100vw - 40px);
    }
    .toast {
      pointer-events: auto; background: #1a1a1a; color: #e5e7eb;
      border: 1px solid #2a2a2a; border-left: 4px solid #6b7280;
      border-radius: 8px; padding: 10px 14px; font-size: 12.5px; font-weight: 600;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,.6); min-width: 220px; max-width: 360px;
      transform: translateX(20px); opacity: 0;
      transition: transform .18s ease, opacity .18s ease;
    }
    .toast.show     { transform: translateX(0); opacity: 1; }
    .toast.positive { border-left-color: #22c55e; }
    .toast.negative { border-left-color: #ef4444; }
    .toast.info     { border-left-color: #7C3AED; }

    .mh-card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 14px; display: flex; flex-direction: column; gap: 2px;
    }
    .mh-pill {
      background: #222222; color: #9ca3af; border: 0;
      font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: 999px;
      cursor: pointer; line-height: 1;
    }
    .mh-pill.active { background: #7C3AED; color: #000; }
    .mh-date {
      background: #222; border: 1px solid #2a2a2a; color: #e5e7eb;
      font-size: 12.5px; padding: 5px 8px; border-radius: 8px; width: 160px;
    }
    .mh-date:focus { outline: none; border-color: #7C3AED; }

    .mh-table { width: 100%; border-collapse: collapse; background: #1a1a1a;
                border: 1px solid #2a2a2a; border-radius: 10px; }
    .mh-table th {
      font-size: 10px; font-weight: 800; letter-spacing: .4px; color: #6b7280;
      padding: 6px 8px; text-align: left; border-bottom: 1px solid #2a2a2a; white-space: nowrap;
    }
    .mh-table td {
      font-size: 11.5px; font-family: ui-monospace, monospace; padding: 6px 8px;
      text-align: left; color: #e5e7eb; border-bottom: 1px solid #161616; white-space: nowrap;
    }
    .mh-table td.r, .mh-table th.r { text-align: right; }
    .mh-empty {
      color: #9ca3af; font-size: 12px; font-style: italic; text-align: center;
      background: #1a1a1a; border: 1px dashed #2a2a2a; border-radius: 10px; padding: 16px;
    }
  </style>
</head>

<body class="bg-bg text-white min-h-screen">

  <!-- Standardized nav (Home / Props / Model Bets / My Bets / Admin) -->
  <nav class="sticky top-0 z-30 bg-bg/95 backdrop-blur border-b border-border">
    <div class="mx-auto max-w-7xl px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-extrabold tracking-tight text-lg">
        <span class="text-accent">●</span> Sports Analysis
      </a>
      <div class="hidden sm:flex items-center gap-5 text-sm text-gray-400">
        <a href="/" class="hover:text-white transition">Home</a>
        <a href="/props" class="hover:text-white transition">Props</a>
        <a href="/modelbets" class="hover:text-white transition">Model Bets</a>
        <a href="/mybets" class="hover:text-white transition">My Bets</a>
        <a href="/top-picks" class="hover:text-white transition">Top Picks</a>
        <a href="/admin" class="hover:text-white transition">Admin</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto max-w-3xl px-4 py-5 flex flex-col gap-4">
    <div class="flex flex-col gap-1">
      <h1 id="mh-title" class="text-[20px] font-extrabold tracking-tight"></h1>
      <a href="/modelbets" class="text-[12px] text-accent hover:underline w-fit">← Model Bets</a>
    </div>

    {# Timeframe controls: preset pills + native date input #}
    <div class="flex items-center flex-wrap gap-[6px]">
      <div id="mh-pills" class="flex items-center flex-wrap gap-[6px]"></div>
      <input type="date" id="mh-date" class="mh-date ml-1">
    </div>

    {# Record header #}
    <div class="mh-card">
      <span id="mh-rec-sub" class="text-[11px] font-extrabold tracking-wide mh-text-dim"></span>
      <span id="mh-rec-value" class="text-[22px] font-extrabold font-mono"></span>
      <span id="mh-rec-counts" class="text-[11px] mh-text-dim"></span>
    </div>

    {# Pick list #}
    <div id="mh-table-wrap" class="overflow-x-auto w-full"></div>
    <div id="mh-empty" class="mh-empty hidden">
      No picks logged for this model in the selected timeframe.
    </div>
  </main>

  <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

  <script id="mh-init" type="application/json">{{ init_data | tojson }}</script>

  <!-- lib.js MUST load before model_history.js (defines window.SBT). -->
  <script src="/static/js/lib.js" defer></script>
  <script src="/static/js/model_history.js" defer></script>
</body>
</html>
